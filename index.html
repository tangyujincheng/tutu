<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>兔兔信件小屋</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- 背景图 -->
        <div class="background">
            <img src="小兔兔的房间.png" alt="小兔兔的房间">
        </div>

        <!-- 左上角按钮 -->
        <div class="controls">
            <button class="control-btn mail-btn" id="mailBtn" title="查看信件">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <span class="unread-badge" id="unreadBadge"></span>
            </button>
            <button class="control-btn write-btn" id="writeBtn" title="写回信">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
            </button>
        </div>

        <!-- 小兔子 -->
        <div class="bunny-container" id="bunnyContainer">
            <div class="bunny" id="bunny">
                <img src="小兔子静态.png" alt="小兔子">
                <div class="tail" id="tail"></div>
            </div>
        </div>

        <!-- 信件弹窗 -->
        <div class="modal" id="mailModal">
            <div class="modal-content letter-modal">
                <div class="modal-header">
                    <h2>兔兔的来信</h2>
                    <button class="close-btn" id="closeMailBtn">&times;</button>
                </div>
                <div class="modal-body" id="mailContent">
                    <!-- 信件内容会在这里动态生成 -->
                </div>
            </div>
        </div>

        <!-- 写信弹窗 -->
        <div class="modal" id="writeModal">
            <div class="modal-content write-modal">
                <div class="modal-header">
                    <h2>给兔兔写信</h2>
                    <button class="close-btn" id="closeWriteBtn">&times;</button>
                </div>
                <div class="modal-body">
                    <textarea id="replyInput" placeholder="写下你想对兔兔说的话..."></textarea>
                    <button class="send-btn" id="sendBtn">发送</button>
                </div>
            </div>
        </div>

        <!-- 消息提示 -->
        <div class="toast" id="toast"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
